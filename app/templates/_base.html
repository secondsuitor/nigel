<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nigel – {{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bulma.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}">
</head>
<body>

<nav class="navbar is-dark" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold" href="{{ url_for('main.home') }}">Nigel</a>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="main-navbar">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div id="main-navbar" class="navbar-menu">
      <div class="navbar-end">
        {% include 'menu.html' %}
      </div>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
      <div class="notification {% if category == 'error' %}is-danger{% elif category == 'success' %}is-success{% elif category == 'warning' %}is-warning{% else %}is-info{% endif %} mb-4">
        {{ message }}
      </div>
      {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</section>

<footer class="footer">
  <div class="content has-text-centered">
    <p>&copy; 2024 Nigel's Blog</p>
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var burger = document.querySelector('.navbar-burger');
  var menu = document.getElementById(burger.dataset.target);
  burger.addEventListener('click', function () {
    burger.classList.toggle('is-active');
    menu.classList.toggle('is-active');
  });
});
</script>

</body>
</html>
